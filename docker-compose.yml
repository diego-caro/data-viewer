services:
  postgres:
    image: postgres:16-alpine
    container_name: data-viewer-db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: cec
      POSTGRES_PASSWORD: cec123
      POSTGRES_DB: data_viewer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cec -d data_viewer"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
