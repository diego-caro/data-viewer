openapi: 3.0.0
info:
  title: data-viewer API
  description: >
    Internal API served by the Next.js backend.
    Source API spec will be added once the external endpoint is defined.
  version: 0.3.0

paths:
  /api/auth/login:
    post:
      summary: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Login successful — returns JWT token and user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email or password, or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User no longer exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories:
    get:
      summary: List all player categories
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'

  /api/fixture/matches:
    get:
      summary: List all tournament fixture matches
      description: >
        Proxies the Hockey Chubut external API, normalizes match data,
        and returns matches with status, score, venue, and round number.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureMatchesResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fixture/clubs:
    get:
      summary: List all clubs with logos
      description: >
        Proxies the Hockey Chubut external API and returns clubs
        with base64-encoded logo images.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureClubsResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/players:
    get:
      summary: List players by category
      parameters:
        - name: categoryId
          in: query
          required: true
          schema:
            type: string
          description: ID of the category to filter players by
      responses:
        '200':
          description: Players for the given category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersResponse'
        '400':
          description: Missing categoryId query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Player:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [active, inactive]
        categoryId:
          type: string
      required: [id, number, firstName, lastName, status, categoryId]

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    PlayersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Player'
        category:
          $ref: '#/components/schemas/Category'

    CategoriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    FixtureMatch:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [completed, pending]
        date:
          type: string
          format: date-time
        venue:
          type: string
        round:
          type: integer
        homeTeam:
          $ref: '#/components/schemas/TeamInfo'
        awayTeam:
          $ref: '#/components/schemas/TeamInfo'
        score:
          oneOf:
            - $ref: '#/components/schemas/MatchScore'
            - type: 'null'
      required: [id, status, date, venue, round, homeTeam, awayTeam, score]

    TeamInfo:
      type: object
      properties:
        clubId:
          type: integer
        clubName:
          type: string
      required: [clubId, clubName]

    MatchScore:
      type: object
      properties:
        home:
          type: integer
        away:
          type: integer
      required: [home, away]

    FixtureClub:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: string
          nullable: true
          description: Base64-encoded PNG image
      required: [id, name, logo]

    FixtureMatchesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FixtureMatch'

    FixtureClubsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FixtureClub'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, player]
        firstName:
          type: string
        lastName:
          type: string
        categoryId:
          type: string
          nullable: true
      required: [id, email, role, firstName, lastName, categoryId]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token (8h expiry)
        user:
          $ref: '#/components/schemas/UserProfile'
      required: [token, user]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
