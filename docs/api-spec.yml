openapi: 3.0.0
info:
  title: data-viewer API
  description: >
    Internal API served by the Next.js backend.
    Source API spec will be added once the external endpoint is defined.
  version: 0.8.0

paths:
  /api/auth/login:
    post:
      summary: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Login successful — returns JWT token and user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email or password, or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User no longer exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users:
    get:
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          description: Missing required fields, invalid role, or missing categoryId for player
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    put:
      summary: Update a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          description: Missing required fields, invalid role, or missing categoryId for player/captain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a user (admin only)
      description: >
        Hard-deletes a user and cascades deletion to player fee records across all payment tables.
        Returns 400 if the admin attempts to delete themselves.
        Returns 409 if the user has associated records that prevent deletion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Cannot delete your own account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User has associated records that cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories:
    get:
      summary: List all player categories
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'

  /api/fixture/divisions:
    get:
      summary: List all fixture divisions/categories
      description: >
        Proxies the Hockey Chubut external API and returns all fixture
        divisions for the current tournament (configured via TOURNAMENT_ID env var).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureDivisionsResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fixture/matches:
    get:
      summary: List tournament fixture matches by division
      description: >
        Proxies the Hockey Chubut external API, normalizes match data,
        and returns matches with status, score, venue, and round number
        for the specified fixture division.
      security:
        - bearerAuth: []
      parameters:
        - name: fixtureId
          in: query
          required: true
          schema:
            type: integer
          description: Fixture division ID (from /api/fixture/divisions)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureMatchesResponse'
        '400':
          description: Missing or invalid fixtureId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fixture/clubs:
    get:
      summary: List clubs with logos by division
      description: >
        Proxies the Hockey Chubut external API and returns clubs
        with base64-encoded logo images for the specified fixture division.
      security:
        - bearerAuth: []
      parameters:
        - name: fixtureId
          in: query
          required: true
          schema:
            type: integer
          description: Fixture division ID (from /api/fixture/divisions)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureClubsResponse'
        '400':
          description: Missing or invalid fixtureId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/fixture/standings:
    get:
      summary: Get standings table by division
      description: >
        Proxies the Hockey Chubut external API and returns the standings
        table for the specified fixture division. Data is normalized from
        Spanish field names to English.
      security:
        - bearerAuth: []
      parameters:
        - name: fixtureId
          in: query
          required: true
          schema:
            type: integer
          description: Fixture division ID (from /api/fixture/divisions)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureStandingsResponse'
        '400':
          description: Missing or invalid fixtureId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: External API failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/players:
    get:
      summary: List players by category
      parameters:
        - name: categoryId
          in: query
          required: true
          schema:
            type: string
          description: ID of the category to filter players by
      responses:
        '200':
          description: Players for the given category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersResponse'
        '400':
          description: Missing categoryId query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments:
    get:
      summary: Get current period's payments (role-filtered)
      description: >
        Admin sees all categories (all types). Captain and player see all
        payment types (match + league + travel) for their assigned category.
        Match and travel use weekly periods; league uses monthly periods.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment configurations for the current period
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentFeeWithPlayers'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create or update payment configuration for a category (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentFeeRequest'
      responses:
        '201':
          description: Payment configuration created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  fee:
                    $ref: '#/components/schemas/PaymentFeeWithPlayers'
        '400':
          description: Missing required fields or non-positive values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/mark-paid:
    post:
      summary: Mark a player's fee as paid (admin or captain)
      description: >
        Searches across all three player fee tables (match, league, travel)
        to find the record by ID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playerFeeId:
                  type: string
                  format: uuid
              required: [playerFeeId]
      responses:
        '200':
          description: Player fee marked as paid
          content:
            application/json:
              schema:
                type: object
                properties:
                  playerFee:
                    $ref: '#/components/schemas/PlayerFee'
        '400':
          description: Missing playerFeeId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Player role (only admin/captain allowed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player fee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/pay:
    post:
      summary: Generate a Mercado Pago payment preference (player or captain)
      description: >
        Creates a Checkout Pro payment preference linked to the captain's MP
        account. Supports individual payment by type (match, league, or travel)
        and combined "pay all" mode for all unpaid fees. Returns an init_point
        URL to redirect the player to MP checkout.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [match, league, travel]
                  default: match
                  description: Payment type to pay (ignored when payAll is true)
                payAll:
                  type: boolean
                  default: false
                  description: When true, creates a single preference for all unpaid fees (match + league + travel combined)
      responses:
        '200':
          description: Payment preference created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPreferenceResult'
        '400':
          description: Player not in a category, or all fees already paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role (only player/captain allowed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No fee found for current period, fee config not found, or payments not yet configured for category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create payment preference with Mercado Pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}/number:
    patch:
      summary: Update a player's jersey number (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playerNumber:
                  type: integer
                  nullable: true
              required: [playerNumber]
      responses:
        '200':
          description: Jersey number updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          description: Missing or invalid playerNumber
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories/{id}/captain:
    put:
      summary: Change captain for a category (admin only)
      description: >
        Swaps the captain role within a category. Demotes the current captain
        to player and promotes the specified user to captain, all within a
        database transaction for atomicity.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  description: ID of the user to promote to captain
              required: [userId]
      responses:
        '200':
          description: Captain changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  newCaptain:
                    $ref: '#/components/schemas/UserProfile'
                  oldCaptain:
                    $ref: '#/components/schemas/UserProfile'
                    nullable: true
        '400':
          description: Missing userId, user not in category, already captain, or not a player
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/webhook:
    post:
      summary: Mercado Pago webhook — marks player fee as paid (public, no JWT)
      description: >
        Receives IPN/webhook notifications from Mercado Pago. Validates the
        signature (when MP_WEBHOOK_SECRET is configured), verifies the payment
        status via the MP API, checks that external_reference matches the
        playerFeeId, and marks the player fee as paid if approved. Searches
        across all three player fee tables to find the record.
      parameters:
        - name: playerFeeId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the player_fees record to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Notification type (only "payment" is processed)
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Mercado Pago payment ID
      responses:
        '200':
          description: Notification processed (paid, not_approved, already_paid, or ignored)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [paid, not_approved, already_paid, ignored]
                  playerFee:
                    $ref: '#/components/schemas/PlayerFee'
        '400':
          description: Missing data.id, missing playerFeeId, or external_reference mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Player fee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: No MP config for the player's category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mp/auth-url:
    get:
      summary: Get Mercado Pago OAuth authorization URL (captain only)
      description: >
        Generates the MP OAuth URL for the authenticated captain. The captain
        is redirected to this URL to authorize the app and connect their MP account.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OAuth URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Full MP OAuth authorization URL
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-captain role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: MP OAuth not configured (missing env vars)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mp/callback:
    get:
      summary: MP OAuth callback — exchanges code for access token (captain only)
      description: >
        Called after captain authorizes the app on MP. Exchanges the
        authorization code for an access token and stores it in captain_mp_config.
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from Mercado Pago OAuth redirect
      responses:
        '200':
          description: MP account connected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Missing code parameter, or captain not assigned to a category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-captain role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to exchange OAuth code with MP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mp/status:
    get:
      summary: Check MP connection status for captain's category (captain only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                  updatedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Last time the MP token was updated (only if connected)
        '400':
          description: Captain not assigned to a category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Non-captain role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Player:
      type: object
      properties:
        id:
          type: string
        number:
          type: integer
          nullable: true
          description: Jersey number (null if not assigned)
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [active, inactive]
        categoryId:
          type: string
        role:
          type: string
          enum: [player, captain]
      required: [id, number, firstName, lastName, status, categoryId, role]

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    PlayersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Player'
        category:
          $ref: '#/components/schemas/Category'

    CategoriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    FixtureMatch:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [completed, pending]
        date:
          type: string
          format: date-time
        venue:
          type: string
        round:
          type: integer
        homeTeam:
          $ref: '#/components/schemas/TeamInfo'
        awayTeam:
          $ref: '#/components/schemas/TeamInfo'
        score:
          oneOf:
            - $ref: '#/components/schemas/MatchScore'
            - type: 'null'
      required: [id, status, date, venue, round, homeTeam, awayTeam, score]

    TeamInfo:
      type: object
      properties:
        clubId:
          type: integer
        clubName:
          type: string
      required: [clubId, clubName]

    MatchScore:
      type: object
      properties:
        home:
          type: integer
        away:
          type: integer
      required: [home, away]

    FixtureClub:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logo:
          type: string
          nullable: true
          description: Base64-encoded PNG image
      required: [id, name, logo]

    FixtureDivision:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]

    StandingsEntry:
      type: object
      properties:
        position:
          type: integer
        clubId:
          type: integer
        clubName:
          type: string
        clubLogo:
          type: string
          nullable: true
          description: Base64-encoded PNG image
        points:
          type: integer
        played:
          type: integer
        won:
          type: integer
        drawn:
          type: integer
        lost:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
      required: [position, clubId, clubName, clubLogo, points, played, won, drawn, lost, goalsFor, goalsAgainst, goalDifference]

    FixtureDivisionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FixtureDivision'

    FixtureStandingsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StandingsEntry'

    FixtureMatchesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FixtureMatch'

    FixtureClubsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FixtureClub'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, player, captain]
        firstName:
          type: string
        lastName:
          type: string
        categoryId:
          type: string
          nullable: true
        playerNumber:
          type: integer
          nullable: true
          description: Jersey number (null if not assigned)
      required: [id, email, role, firstName, lastName, categoryId, playerNumber]

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [admin, player, captain]
        firstName:
          type: string
        lastName:
          type: string
        categoryId:
          type: string
          nullable: true
          description: Required when role is 'player' or 'captain'
        playerNumber:
          type: integer
          nullable: true
          description: Optional jersey number for player/captain
      required: [email, password, role, firstName, lastName]

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, player, captain]
        firstName:
          type: string
        lastName:
          type: string
        categoryId:
          type: string
          nullable: true
          description: Required when role is 'player' or 'captain'; cleared automatically when role is 'admin'
        password:
          type: string
          description: Optional — only hashes and updates if provided
      required: [email, role, firstName, lastName]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token (8h expiry)
        user:
          $ref: '#/components/schemas/UserProfile'
      required: [token, user]

    PaymentFeeWithPlayers:
      type: object
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
        categoryName:
          type: string
        totalAmount:
          type: number
        availablePlayers:
          type: integer
        perPlayerAmount:
          type: number
        periodStartDate:
          type: string
          format: date
          description: Monday of the week for match/travel, 1st of the month for league
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [match, league, travel]
          description: Payment type — stored in separate DB tables per type
        playerFees:
          type: array
          items:
            $ref: '#/components/schemas/PlayerFee'
        paidCount:
          type: integer
        unpaidCount:
          type: integer
      required: [id, categoryId, categoryName, totalAmount, availablePlayers, perPlayerAmount, periodStartDate, createdBy, createdAt, type, playerFees, paidCount, unpaidCount]

    PlayerFee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        feeId:
          type: string
          format: uuid
          description: References the parent fee table (match_fees, league_fees, or travel_fees)
        userId:
          type: string
          format: uuid
        playerName:
          type: string
        status:
          type: string
          enum: [pending, paid]
        paidAt:
          type: string
          format: date-time
          nullable: true
      required: [id, feeId, userId, playerName, status, paidAt]

    CreatePaymentFeeRequest:
      type: object
      properties:
        categoryId:
          type: string
        totalAmount:
          type: number
          minimum: 0.01
        availablePlayers:
          type: integer
          minimum: 1
        type:
          type: string
          enum: [match, league, travel]
          default: match
          description: Payment type — determines which DB table to write to
      required: [categoryId, totalAmount, availablePlayers]

    PaymentPreferenceResult:
      type: object
      properties:
        preferenceId:
          type: string
        initPoint:
          type: string
          description: Mercado Pago Checkout Pro URL (production)
        sandboxInitPoint:
          type: string
          description: Mercado Pago Checkout Pro URL (sandbox)
      required: [preferenceId, initPoint, sandboxInitPoint]

    CaptainMpConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
        accessToken:
          type: string
          description: Captain's Mercado Pago access token
        updatedAt:
          type: string
          format: date-time
      required: [id, categoryId, accessToken, updatedAt]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
