<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <img
        src="logo-cec.png"
        alt="CEC Logo"
        class="mx-auto h-16 w-auto"
      />
      <h1 class="mt-4 text-2xl font-bold text-gray-900">Sign In</h1>
    </div>

    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <div
        *ngIf="error()"
        data-testid="login-error"
        class="mb-4 rounded-md border border-red-200 bg-red-50 p-3 text-sm text-red-700"
      >
        {{ error() }}
      </div>

      <form (ngSubmit)="onSubmit()" data-testid="login-form">
        <div class="mb-4">
          <label for="email" class="mb-1 block text-sm font-medium text-gray-700">
            Email
          </label>
          <input
            id="email"
            type="email"
            data-testid="email-input"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="admin@cec.com"
          />
        </div>

        <div class="mb-6">
          <label for="password" class="mb-1 block text-sm font-medium text-gray-700">
            Password
          </label>
          <input
            id="password"
            type="password"
            data-testid="password-input"
            [(ngModel)]="password"
            name="password"
            required
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          data-testid="login-button"
          [disabled]="loading() || !email || !password"
          class="w-full rounded-md bg-blue-500 px-4 py-2 text-sm font-medium text-white hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <span class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
              Signing in...
            </span>
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>
</div>
