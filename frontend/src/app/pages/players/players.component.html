<div class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-3xl px-4 py-8">
    <h1 class="mb-6 text-2xl font-bold text-gray-900">Players</h1>

    <!-- Error State -->
    <div
      *ngIf="error"
      data-testid="error-state"
      class="rounded-lg border border-red-200 bg-red-50 p-4 text-red-700"
    >
      <p>Unable to load data. Please try again later.</p>
    </div>

    <!-- Content -->
    <ng-container *ngIf="!loading && !error">
      <!-- Category Selector (hidden for player role) -->
      <div class="mb-6" *ngIf="categories.length > 0 && !isPlayer">
        <label for="category-select" class="mb-2 block text-sm font-medium text-gray-700">
          Category
        </label>
        <select
          id="category-select"
          data-testid="category-select"
          class="block w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-gray-900 shadow-sm focus:border-blue-500 focus:ring-blue-500"
          [value]="selectedCategoryId"
          (change)="onCategoryChange($any($event.target).value)"
        >
          <option *ngFor="let category of categories" [value]="category.id">
            {{ category.name }}
          </option>
        </select>
      </div>

      <!-- Empty State -->
      <div
        *ngIf="players.length === 0"
        data-testid="empty-state"
        class="rounded-lg border border-gray-200 bg-white py-12 text-center"
      >
        <p class="text-gray-500">No players found in this category.</p>
      </div>

      <!-- Players List -->
      <div *ngIf="players.length > 0" class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
        <ul class="divide-y divide-gray-200">
          <li
            *ngFor="let player of players"
            data-testid="player-row"
            class="flex items-center gap-4 px-4 py-3"
          >
            <span
              [attr.data-testid]="'badge-' + player.status"
              class="flex h-8 w-8 items-center justify-center rounded-full text-sm font-bold text-white"
              [ngClass]="{
                'bg-green-500': player.status === 'active',
                'bg-red-500': player.status === 'inactive'
              }"
            >
              {{ player.number ?? '-' }}
            </span>
            <div class="flex flex-1 items-center gap-2">
              <span class="font-semibold text-gray-900">{{ player.lastName }}</span>,
              <span class="text-gray-600">{{ player.firstName }}</span>
              <span
                *ngIf="player.role === 'captain'"
                data-testid="captain-badge"
                class="ml-1 inline-flex items-center rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-700"
                title="Captain"
              >
                C
              </span>
            </div>

            <!-- Admin: edit jersey number -->
            @if (isAdmin) {
              @if (editingPlayerId() === player.id) {
                <div class="flex items-center gap-1" data-testid="edit-number-form">
                  <input
                    type="number"
                    data-testid="number-input"
                    [ngModel]="editingNumber()"
                    (ngModelChange)="editingNumber.set($event)"
                    class="w-16 rounded border border-gray-300 px-2 py-1 text-sm"
                    min="1"
                  />
                  <button
                    data-testid="save-number-button"
                    (click)="saveNumber(player)"
                    [disabled]="savingNumber()"
                    class="rounded bg-green-500 px-2 py-1 text-xs text-white hover:bg-green-600 disabled:opacity-50"
                  >
                    Save
                  </button>
                  <button
                    data-testid="cancel-number-button"
                    (click)="cancelEditNumber()"
                    class="rounded bg-gray-300 px-2 py-1 text-xs text-gray-700 hover:bg-gray-400"
                  >
                    Cancel
                  </button>
                </div>
              } @else {
                <button
                  data-testid="edit-number-button"
                  (click)="startEditNumber(player)"
                  class="rounded border border-gray-300 px-2 py-1 text-xs text-gray-600 hover:bg-gray-100"
                  title="Edit jersey number"
                >
                  #
                </button>
              }

              <!-- Change captain button -->
              @if (player.role !== 'captain') {
                <button
                  data-testid="make-captain-button"
                  (click)="onChangeCaptain(player)"
                  [disabled]="changingCaptain()"
                  class="rounded border border-amber-300 bg-amber-50 px-2 py-1 text-xs text-amber-700 hover:bg-amber-100 disabled:opacity-50"
                  title="Make captain"
                >
                  Make Captain
                </button>
              }
            }
          </li>
        </ul>
      </div>
    </ng-container>
  </div>
</div>
