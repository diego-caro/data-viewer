<div class="flex min-h-screen items-center justify-center bg-gray-50">
  <div class="mx-auto max-w-md rounded-lg border border-gray-200 bg-white p-8 text-center shadow-sm">
    <!-- Loading -->
    <div *ngIf="status() === 'loading'" data-testid="mp-callback-loading">
      <div class="mx-auto mb-4 h-8 w-8 animate-spin rounded-full border-4 border-gray-300 border-t-blue-500"></div>
      <p class="text-gray-600">{{ message() }}</p>
    </div>

    <!-- Success -->
    <div *ngIf="status() === 'success'" data-testid="mp-callback-success">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-green-100">
        <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <p class="font-semibold text-green-800">{{ message() }}</p>
      <p class="mt-2 text-sm text-gray-500">Redirecting to fees page...</p>
    </div>

    <!-- Error -->
    <div *ngIf="status() === 'error'" data-testid="mp-callback-error">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-100">
        <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
      <p class="font-semibold text-red-800">{{ message() }}</p>
      <button
        data-testid="mp-callback-retry"
        (click)="router.navigate(['/fees'])"
        class="mt-4 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
      >Go to Fees</button>
    </div>
  </div>
</div>
